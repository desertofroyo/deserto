<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Order — Deserto Frozen Yogurt & Café</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
  body { margin: 0; }
  html { scroll-behavior: smooth; }
  .nav-link { position: relative; transition: color .16s ease; }
  .nav-link::after { content: ""; position: absolute; left: 0; right: 100%; bottom: -5px; height: 2px; background: var(--orange-500); transition: right .22s ease; }
  .nav-link:hover { color: var(--wine-700); }
  .nav-link:hover::after { right: 0; }
  .btn-wine { transition: background .16s ease, transform .12s ease; }
  .btn-wine:hover { background: var(--wine-800); }
  .btn-wine:active { transform: scale(0.97); }
  .order-add { transition: transform .14s var(--ease-out, ease), background .14s ease; }
  .order-add:hover { transform: scale(1.08); }
  .order-add:active { transform: scale(0.94); }
  .qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border-default); background: var(--white); color: var(--ink-700); font-weight: 800; font-size: 15px; line-height: 1; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; padding: 0; transition: all .14s ease; }
  .qty-btn:hover { border-color: var(--wine-700); color: var(--wine-700); }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="order-root"></div>
<script src="site-data.jsx"></script>
<script type="text/babel" src="site-parts.jsx"></script>
<script type="text/babel" src="site-order.jsx"></script>
</body>
</html>
