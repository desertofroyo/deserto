<!-- @dsCard group="Components" viewport="700x320" name="Form fields" subtitle="Inputs with focus ring, helper & error states, plus switches" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:24px;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 24px;max-width:620px}
  .row{display:flex;gap:20px;align-items:center;margin-top:20px}
  .lbl{font-size:11px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:10px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Switch } = window.DesertoDesignSystem_e4c2c1;
  function Demo(){
    const [a,setA]=React.useState(true);const [b,setB]=React.useState(false);
    return (<div>
      <div className="grid">
        <Input label="Your name" placeholder="Jane Foodie" />
        <Input label="Email" placeholder="you@email.com" helperText="For your digital receipt." />
        <Input label="Search the menu" placeholder="Try “mango”" leading={<span>⌕</span>} />
        <Input label="Phone" defaultValue="123" error="Enter a valid number." />
      </div>
      <div className="lbl" style={{marginTop:'22px'}}>Switches</div>
      <div className="row" style={{marginTop:'4px'}}>
        <Switch checked={a} onChange={setA} label="Email receipts" />
        <Switch checked={b} onChange={setB} label="Loyalty offers" />
        <Switch checked={true} disabled label="Locked on" />
      </div>
    </div>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
