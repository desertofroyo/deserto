<!-- @dsCard group="Type" viewport="700x120" name="Eyebrow & labels" subtitle="Uppercase Proxima with wide tracking marks sections." -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:22px;font-family:var(--font-body);display:flex;gap:40px;align-items:center;flex-wrap:wrap}
  .stack{display:flex;flex-direction:column;gap:6px}
  .ev{font-family:"Proxima Nova";font-weight:700;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--brand-accent-strong)}
  .ev.wine{color:var(--wine-700)}
  .ev.olive{color:var(--olive-600)}
  .lbl{font-family:"Proxima Nova";font-weight:700;font-size:13px;letter-spacing:.04em;color:var(--ink-700)}
</style></head>
<body>
  <div class="stack"><span class="ev">NEW THIS SEASON</span><span class="ev wine">OUR STORY</span><span class="ev olive">GOOD FOR YOU</span></div>
  <div class="stack"><span class="lbl">Add to order</span><span class="lbl">Pickup time</span><span class="lbl">Loyalty points</span></div>
</body></html>
