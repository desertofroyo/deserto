<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-body)}
  .wrap{display:flex;padding:18px;gap:0}
  .sw{flex:1;height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:var(--wine-900)}
  .sw small{font-size:10px;opacity:.8;letter-spacing:.04em}
  .sw b{font-size:12px;font-weight:700}
  .sw:first-child{border-radius:12px 0 0 12px}
  .sw:last-child{border-radius:0 12px 12px 0}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:var(--orange-700);color:#fff"><b>700</b><small>#C26410</small></div>
  <div class="sw" style="background:var(--orange-600);color:#fff"><b>600</b><small>#E67D1B</small></div>
  <div class="sw" style="background:var(--orange-500)"><b>500 ·base</b><small>#FF9425</small></div>
  <div class="sw" style="background:var(--orange-400)"><b>400</b><small>#FFAC53</small></div>
  <div class="sw" style="background:var(--orange-300)"><b>300</b><small>#FFC586</small></div>
  <div class="sw" style="background:var(--orange-200)"><b>200</b><small>#FFDEBC</small></div>
  <div class="sw" style="background:var(--orange-100)"><b>100</b><small>#FFF1E1</small></div>
</div></body></html>
