<!-- @dsCard group="Colors" viewport="700x230" name="Seasonal — Expressive" subtitle="Three rotating palettes tied to the season's flavors (brand book, COLOR 03)." -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-body)}
  .wrap{display:flex;padding:18px;gap:16px}
  .col{flex:1;display:flex;flex-direction:column;gap:8px}
  .t{font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:.02em;color:var(--wine-900);margin-bottom:2px}
  .stack{display:flex;flex-direction:column;border-radius:12px;overflow:hidden;border:1px solid var(--border-default)}
  .s{height:30px}
</style></head>
<body><div class="wrap">
  <div class="col">
    <span class="t">Primavera</span>
    <div class="stack">
      <div class="s" style="background:var(--lime-500)"></div>
      <div class="s" style="background:var(--leaf-200)"></div>
      <div class="s" style="background:var(--peach-200)"></div>
      <div class="s" style="background:var(--orange-500)"></div>
      <div class="s" style="background:var(--caramel-500)"></div>
    </div>
  </div>
  <div class="col">
    <span class="t">Verano</span>
    <div class="stack">
      <div class="s" style="background:var(--wine-700)"></div>
      <div class="s" style="background:var(--olive-700)"></div>
      <div class="s" style="background:var(--lime-500)"></div>
      <div class="s" style="background:var(--leaf-200)"></div>
      <div class="s" style="background:var(--orange-500)"></div>
    </div>
  </div>
  <div class="col">
    <span class="t">Otoño</span>
    <div class="stack">
      <div class="s" style="background:var(--wine-700)"></div>
      <div class="s" style="background:var(--rose-500)"></div>
      <div class="s" style="background:var(--peach-200)"></div>
      <div class="s" style="background:var(--orange-500)"></div>
      <div class="s" style="background:var(--caramel-500)"></div>
    </div>
  </div>
</div></body></html>
