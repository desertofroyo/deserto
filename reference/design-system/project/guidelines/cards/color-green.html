<!-- @dsCard group="Colors" viewport="700x150" name="Olive & Lime — Fresh" subtitle="7762 C · 390 C · 2288 C — the yogur/fresh side. Olive grounds, lime pops." -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-body)}
  .wrap{display:flex;padding:18px;gap:0}
  .sw{flex:1;height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff}
  .sw small{font-size:10px;opacity:.85;letter-spacing:.04em}
  .sw b{font-size:11px;font-weight:700}
  .sw:first-child{border-radius:12px 0 0 12px}
  .sw:last-child{border-radius:0 12px 12px 0}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:var(--olive-800)"><b>Olive 800</b><small>#3F452B</small></div>
  <div class="sw" style="background:var(--olive-600)"><b>Olive ·base</b><small>#6A704B</small></div>
  <div class="sw" style="background:var(--olive-400);color:var(--olive-900)"><b>Olive 400</b><small>#9DA181</small></div>
  <div class="sw" style="background:var(--lime-600)"><b>Lime 600</b><small>#A6AB29</small></div>
  <div class="sw" style="background:var(--lime-500);color:var(--olive-900)"><b>Lime ·base</b><small>#C4C934</small></div>
  <div class="sw" style="background:var(--leaf-200);color:var(--olive-900)"><b>Pale ·base</b><small>#DBEBA9</small></div>
  <div class="sw" style="background:var(--leaf-100);color:var(--olive-900)"><b>Leaf 100</b><small>#ECF4D2</small></div>
</div></body></html>
