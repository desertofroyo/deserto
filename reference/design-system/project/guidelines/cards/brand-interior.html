<!-- @dsCard group="Brand" viewport="700x230" name="Interior & atmosphere" subtitle="Atmosphere built strictly from the nine — the brand's color-blocked mixes (max 3 inks)." -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-body)}
  .wrap{display:flex;gap:14px;padding:18px 20px;height:230px;box-sizing:border-box}
  .mix{flex:1;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-sm);position:relative}
  .mix .band{flex:1;display:flex;align-items:flex-end;padding:9px 11px}
  .iso{font-family:var(--font-display);font-weight:800;font-size:30px;transform:scaleX(-1);line-height:1}
  .tag{position:absolute;left:0;right:0;bottom:0;padding:7px 11px;font-size:10px;font-weight:800;letter-spacing:.05em;text-align:center;text-transform:uppercase}
</style></head>
<body>
  <div class="wrap">
    <!-- Wine + Lime — signature high-contrast -->
    <div class="mix">
      <div class="band" style="background:var(--wine-700);color:var(--lime-500)"><span class="iso">)</span></div>
      <div class="band" style="flex:.55;background:var(--lime-500)"></div>
      <div class="tag" style="background:var(--lime-500);color:var(--wine-900)">Wine · Lime</div>
    </div>
    <!-- Orange + Wine — the pop -->
    <div class="mix">
      <div class="band" style="background:var(--orange-500);color:var(--wine-700)"><span class="iso">)</span></div>
      <div class="band" style="flex:.55;background:var(--wine-700)"></div>
      <div class="tag" style="background:var(--wine-700);color:var(--orange-400)">Orange · Wine</div>
    </div>
    <!-- Olive + Pale Lime + Peach — fresh trio -->
    <div class="mix">
      <div class="band" style="background:var(--olive-600);color:var(--leaf-200)"><span class="iso">)</span></div>
      <div class="band" style="flex:.4;background:var(--leaf-200)"></div>
      <div class="band" style="flex:.4;background:var(--peach-200)"></div>
      <div class="tag" style="background:var(--peach-200);color:var(--olive-800)">Olive · Lime · Peach</div>
    </div>
    <!-- Caramel + Coffee + Peach — warm café trio -->
    <div class="mix">
      <div class="band" style="background:var(--caramel-500);color:var(--peach-200)"><span class="iso">)</span></div>
      <div class="band" style="flex:.4;background:var(--coffee-600)"></div>
      <div class="band" style="flex:.4;background:var(--peach-200)"></div>
      <div class="tag" style="background:var(--peach-200);color:var(--coffee-700)">Caramel · Coffee · Peach</div>
    </div>
  </div>
</body></html>
