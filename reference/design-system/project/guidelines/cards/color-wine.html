<!-- @dsCard group="Colors" viewport="700x150" name="Wine — Primary" subtitle="3523 C · the wordmark maroon. Primary ink, buttons & brand surfaces." -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-body)}
  .wrap{display:flex;padding:18px;gap:0}
  .sw{flex:1;height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff}
  .sw small{font-size:10px;opacity:.85;letter-spacing:.04em}
  .sw b{font-size:12px;font-weight:700}
  .sw:first-child{border-radius:12px 0 0 12px}
  .sw:last-child{border-radius:0 12px 12px 0}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:var(--wine-900)"><b>900</b><small>#3A171B</small></div>
  <div class="sw" style="background:var(--wine-800)"><b>800</b><small>#551F25</small></div>
  <div class="sw" style="background:var(--wine-700)"><b>700 ·base</b><small>#762F35</small></div>
  <div class="sw" style="background:var(--wine-500)"><b>500</b><small>#A14E54</small></div>
  <div class="sw" style="background:var(--wine-400)"><b>400</b><small>#BC7A7E</small></div>
  <div class="sw" style="background:var(--wine-200);color:var(--wine-900)"><b>200</b><small>#E8CFD1</small></div>
  <div class="sw" style="background:var(--wine-100);color:var(--wine-900)"><b>100</b><small>#F6E9EA</small></div>
</div></body></html>
