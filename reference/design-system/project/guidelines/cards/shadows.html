<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-page);padding:28px 22px;font-family:"Proxima Nova";display:flex;gap:22px;align-items:center;flex-wrap:wrap}
  .b{width:120px;height:84px;background:var(--white);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted);font-weight:700}
</style></head>
<body>
  <div class="b" style="box-shadow:var(--shadow-xs)">xs</div>
  <div class="b" style="box-shadow:var(--shadow-sm)">sm</div>
  <div class="b" style="box-shadow:var(--shadow-md)">md</div>
  <div class="b" style="box-shadow:var(--shadow-lg)">lg</div>
  <div class="b" style="box-shadow:var(--shadow-accent)">accent</div>
</body></html>
