<!-- @dsCard group="Colors" viewport="700x150" name="Coffee & Caramel — Warm" subtitle="2320 C · 7576 C — the café side. Deep browns & warm sienna." -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-body)}
  .wrap{display:flex;padding:18px;gap:0}
  .sw{flex:1;height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff}
  .sw small{font-size:10px;opacity:.85;letter-spacing:.04em}
  .sw b{font-size:11px;font-weight:700}
  .sw:first-child{border-radius:12px 0 0 12px}
  .sw:last-child{border-radius:0 12px 12px 0}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:var(--coffee-800)"><b>Coffee 800</b><small>#432912</small></div>
  <div class="sw" style="background:var(--coffee-600)"><b>Coffee ·base</b><small>#714826</small></div>
  <div class="sw" style="background:var(--coffee-500)"><b>Coffee 500</b><small>#8A5C38</small></div>
  <div class="sw" style="background:var(--caramel-500)"><b>Caramel ·base</b><small>#AE6434</small></div>
  <div class="sw" style="background:var(--caramel-300);color:var(--coffee-800)"><b>Caramel 300</b><small>#D69E75</small></div>
  <div class="sw" style="background:var(--caramel-200);color:var(--coffee-800)"><b>Caramel 200</b><small>#E7C2A1</small></div>
  <div class="sw" style="background:var(--caramel-100);color:var(--coffee-800)"><b>Caramel 100</b><small>#F5E4D4</small></div>
</div></body></html>
