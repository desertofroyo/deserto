<!-- @dsCard group="Brand" viewport="700x200" name="Voice & tone" subtitle="Warm · welcoming · sophisticated yet accessible." -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:20px 22px;font-family:"Proxima Nova"}
  .pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .pill{font-size:12px;font-weight:700;padding:5px 12px;border-radius:99px}
  .a{background:var(--mauve-100);color:var(--mauve-800)}
  .b{background:var(--sage-100);color:var(--sage-800)}
  .c{background:var(--rose-100);color:var(--wine-700)}
  .quote{font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--wine-700);line-height:1.1}
  .do{display:flex;gap:24px;margin-top:12px;font-size:13px}
  .do div{flex:1}
  .do b{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
  .do .y b{color:var(--sage-700)} .do .n b{color:var(--wine-600)}
  .do p{margin:2px 0;color:var(--text-body)}
</style></head>
<body>
  <div class="pills"><span class="pill a">Cálida</span><span class="pill b">Innovadora</span><span class="pill c">Creativa</span></div>
  <div class="quote">"Mi gusto, mi estilo."</div>
  <div class="do">
    <div class="y"><b>We say</b><p>Savor every moment.</p><p>Built fresh, your way.</p></div>
    <div class="n"><b>We avoid</b><p>Cheap. Diet. Guilt-free.</p><p>Corporate jargon.</p></div>
  </div>
</body></html>
