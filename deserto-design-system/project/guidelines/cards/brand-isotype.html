<!-- @dsCard group="Brand" viewport="700x200" name="Isotype & lockups" subtitle="The winking smile stands alone for app icons & favicons." -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);display:flex;align-items:center;gap:26px;height:200px;padding:0 30px;box-sizing:border-box}
  .tile{display:flex;flex-direction:column;align-items:center;gap:8px}
  .lbl{font-family:"Proxima Nova";font-size:11px;color:var(--text-muted);letter-spacing:.04em}
  .iso{height:96px}
  .badge{width:96px;height:96px;border-radius:24px;background:var(--cream-50);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
  .badge img{height:64px}
  .wine{background:var(--wine-700)}
</style></head>
<body>
  <div class="tile"><img class="iso" src="../../assets/logos/deserto-isotype.png"><span class="lbl">Isotype</span></div>
  <div class="tile"><div class="badge"><img src="../../assets/logos/deserto-isotype.png"></div><span class="lbl">App icon</span></div>
  <div class="tile"><div class="badge wine"><img src="../../assets/logos/deserto-isotype-white.png"></div><span class="lbl">Reversed</span></div>
</body></html>
