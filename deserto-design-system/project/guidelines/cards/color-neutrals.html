<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Warm peach-cream surfaces & espresso ink. Brown-leaning, never grey." -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-body)}
  .wrap{display:flex;padding:18px;gap:0}
  .sw{flex:1;height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
  .sw small{font-size:10px;opacity:.8;letter-spacing:.04em}
  .sw b{font-size:11px;font-weight:700}
  .sw:first-child{border-radius:12px 0 0 12px}
  .sw:last-child{border-radius:0 12px 12px 0;border:1px solid var(--border-default)}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:var(--ink-900);color:#fff"><b>ink-900</b><small>#2A1D11</small></div>
  <div class="sw" style="background:var(--ink-700);color:#fff"><b>ink-700</b><small>#4A3B2C</small></div>
  <div class="sw" style="background:var(--ink-500);color:#fff"><b>ink-500</b><small>#79695A</small></div>
  <div class="sw" style="background:var(--ink-300);color:var(--ink-900)"><b>ink-300</b><small>#C6B9AC</small></div>
  <div class="sw" style="background:var(--sand-200);color:var(--ink-700)"><b>sand-200</b><small>#E8DCCD</small></div>
  <div class="sw" style="background:var(--cream-50);color:var(--ink-700)"><b>cream-50</b><small>#FBF1E8</small></div>
  <div class="sw" style="background:var(--white);color:var(--ink-700)"><b>white</b><small>#FFFFFF</small></div>
</div></body></html>
