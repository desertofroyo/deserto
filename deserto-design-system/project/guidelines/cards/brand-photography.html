<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:14px;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .ph{aspect-ratio:1/1;border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .ph img{width:100%;height:100%;object-fit:cover}
  .wide{grid-column:span 2;aspect-ratio:2/1}
</style></head>
<body><div class="grid">
  <div class="ph wide"><img src="../../assets/images/interior-froyo-arches.jpg" alt=""></div>
  <div class="ph"><img src="../../assets/images/froyo-cup-mauve.jpg" style="object-position:center 30%" alt=""></div>
  <div class="ph"><img src="../../assets/images/cone-twotone.jpg" style="object-position:center 25%" alt=""></div>
  <div class="ph"><img src="../../assets/images/strawberry-flatlay.jpg" style="object-position:center 30%" alt=""></div>
  <div class="ph"><img src="../../assets/images/refreshers-trio.jpg" alt=""></div>
  <div class="ph"><img src="../../assets/images/macro-swirl.jpg" alt=""></div>
  <div class="ph"><img src="../../assets/images/guava-diluna.jpg" alt=""></div>
</div></body></html>
