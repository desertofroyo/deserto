<!-- @dsCard group="Colors" viewport="700x150" name="Rose & Peach — Soft" subtitle="2447 C · 2437 C — the gentle appetite accents. Strawberry, taro, citrus foam." -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-body)}
  .wrap{display:flex;padding:18px;gap:0}
  .sw{flex:1;height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:var(--wine-900)}
  .sw small{font-size:10px;opacity:.8;letter-spacing:.04em}
  .sw b{font-size:11px;font-weight:700}
  .sw:first-child{border-radius:12px 0 0 12px}
  .sw:last-child{border-radius:0 12px 12px 0}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:var(--rose-700);color:#fff"><b>Rose 700</b><small>#7D454A</small></div>
  <div class="sw" style="background:var(--rose-500);color:#fff"><b>Rose ·base</b><small>#B16E74</small></div>
  <div class="sw" style="background:var(--rose-300)"><b>Rose 300</b><small>#D8B0B3</small></div>
  <div class="sw" style="background:var(--rose-100)"><b>Rose 100</b><small>#F6ECED</small></div>
  <div class="sw" style="background:var(--peach-300)"><b>Peach 300</b><small>#F0C3A9</small></div>
  <div class="sw" style="background:var(--peach-200)"><b>Peach ·base</b><small>#F8D8C5</small></div>
  <div class="sw" style="background:var(--peach-100)"><b>Peach 100</b><small>#FCEEE4</small></div>
</div></body></html>
