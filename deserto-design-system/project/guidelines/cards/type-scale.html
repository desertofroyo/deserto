<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>

  .row{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--border-subtle);padding:5px 0}
  .row:last-child{border:none}
  .tok{font-family:"Proxima Nova";font-size:11px;color:var(--text-muted);width:64px;flex:none}

</style></head>
<body>
  <div class="row"><span class="tok">5xl·61</span><span class="spec" style="font-size:48px">Deserto</span></div>

  <div class="row"><span class="tok">sm·14</span><span class="spec" style="font-size:14px;font-family:'Proxima Nova';font-weight:400">Captions, helper text and meta.</span></div>
