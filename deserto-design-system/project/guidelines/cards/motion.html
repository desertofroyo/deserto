<!-- @dsCard group="Spacing" viewport="700x150" name="Motion" subtitle="Quick, warm easing with an optional playful bounce." -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:20px 22px;font-family:"Proxima Nova"}
  .row{display:flex;align-items:center;gap:14px;margin:8px 0}
  .name{width:130px;font-size:12px;color:var(--ink-700);font-weight:700}
  .track{flex:1;height:8px;background:var(--sand-100);border-radius:99px;position:relative;overflow:hidden}
  .dot{position:absolute;top:-6px;width:20px;height:20px;border-radius:50%;background:var(--orange-500);animation:run 2.4s infinite}
  .e1{animation-timing-function:var(--ease-out)}
  .e2{animation-timing-function:var(--ease-in-out)}
  .e3{animation-timing-function:var(--ease-bounce)}
  @keyframes run{0%{left:0}50%{left:calc(100% - 20px)}100%{left:0}}
  .meta{font-size:11px;color:var(--text-muted);margin-top:6px}
</style></head>
<body>
  <div class="row"><span class="name">ease-out</span><span class="track"><span class="dot e1"></span></span></div>
  <div class="row"><span class="name">ease-in-out</span><span class="track"><span class="dot e2"></span></span></div>
  <div class="row"><span class="name">ease-bounce</span><span class="track"><span class="dot e3"></span></span></div>
  <div class="meta">Durations — fast 120ms · base 220ms · slow 380ms</div>
</body></html>
