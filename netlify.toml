# Netlify configuration for the Deserto site.
[build]
  command = "npm run build"   # runs "prebuild" (scripts/build-menu.mjs) first, then vite build
  publish = "dist"
  functions = "netlify/functions"

# SPA routing: serve the app for any path so deep links (/menu, /publish) work
# on refresh. Real files (assets, functions) are served before this catch-all.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
