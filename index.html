<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/assets/logos/deserto-mark.svg" />

    <!-- Primary meta. Per-route titles/descriptions are set at runtime by <Seo>
         (src/site/Seo.jsx); these are the defaults crawlers see for the shell. -->
    <title>Deserto Frozen Yogurt &amp; Café — Tucson, AZ</title>
    <meta
      name="description"
      content="Self-serve frozen yogurt, handcrafted coffee, sparkling tonics and layered desserts on River Rd in Tucson. Open daily 10 AM – 10 PM."
    />
    <link rel="canonical" href="https://desertofroyo.com/" />
    <meta name="theme-color" content="#6B2233" />

    <!-- Open Graph — link previews on Facebook, Instagram, iMessage, WhatsApp.
         These scrapers do not run JavaScript, so they always read these tags. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Deserto Frozen Yogurt &amp; Café" />
    <meta property="og:title" content="Deserto Frozen Yogurt &amp; Café — Tucson, AZ" />
    <meta
      property="og:description"
      content="Self-serve frozen yogurt, handcrafted coffee, sparkling tonics and layered desserts on River Rd in Tucson. Open daily 10 AM – 10 PM."
    />
    <meta property="og:url" content="https://desertofroyo.com/" />
    <meta property="og:image" content="https://desertofroyo.com/assets/og/deserto-share.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="A caramel frozen yogurt swirl in a branded Deserto cup"
    />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Deserto Frozen Yogurt &amp; Café — Tucson, AZ" />
    <meta
      name="twitter:description"
      content="Self-serve frozen yogurt, handcrafted coffee, sparkling tonics and layered desserts on River Rd in Tucson. Open daily 10 AM – 10 PM."
    />
    <meta name="twitter:image" content="https://desertofroyo.com/assets/og/deserto-share.jpg" />

    <!-- Structured data (JSON-LD) — what powers local search and Google Maps
         rich results, the highest-impact SEO item for a café. Generated at
         build time from content/site.json by the plugin in vite.config.js, so
         address/hours/socials can't drift from what the owner edits in the CMS.
         Do not hand-write schema here; change content/site.json instead. -->
    <!--business-jsonld-->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
