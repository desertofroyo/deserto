# Sveltia CMS configuration for Deserto.
# Docs / setup: docs/CMS-SETUP.md
#
# IMPORTANT: replace YOUR-SITE.netlify.app below with the real site address once
# you know it (and again when the custom domain is attached). It must match the
# site the CMS is served from, and the GitHub OAuth app's callback URL.

backend:
  name: github
  repo: desertofroyo/deserto
  branch: main
  # GitHub login is handled by our own Netlify functions (no third-party needed):
  base_url: https://deserto-froyo.netlify.app
  auth_endpoint: .netlify/functions/auth

# Media library scoped to /assets so the CMS can preview ALL existing site
# images (products, hero, logos), not just fresh uploads. New uploads land in
# public/assets/ and are served from /assets/...
media_folder: "public/assets"
public_folder: "/assets"

# Friendlier UI copy
site_url: https://deserto-froyo.netlify.app
display_url: https://deserto-froyo.netlify.app
publish_mode: simple

collections:
  # ----------------------------------------------------------------- HOME PAGE
  - name: home
    label: "Home page"
    description: "The big rotating banner, the 'What we make' cards, and the story gallery."
    files:
      - name: hero
        label: "Hero — homepage banner"
        file: "content/hero.json"
        icon: home
        fields:
          - { label: "Badge (small pill above the headline)", name: badge, widget: string }
          - { label: "Headline", name: headline, widget: string, hint: "First part, in wine. e.g. Where coffee meets" }
          - { label: "Headline accent (colored second part)", name: accent, widget: string, hint: "Shown in orange. e.g. creamy bliss." }
          - { label: "Subtext", name: subtext, widget: text }
          - { label: "Primary button label", name: primaryLabel, widget: string }
          - { label: "Primary button link", name: primaryTo, widget: string, hint: "e.g. /menu" }
          - { label: "Secondary button label", name: secondaryLabel, widget: string, hint: "This button scrolls down to the Visit-us map." }
          - label: "Carousel photos"
            name: photos
            widget: list
            label_singular: "photo"
            summary: "{{fields.alt}}"
            fields:
              - { label: "Photo", name: src, widget: image }
              - { label: "Description (for screen readers)", name: alt, widget: string }

      - name: highlights
        label: "What we make (cards)"
        file: "content/highlights.json"
        icon: grid_view
        fields:
          - label: "Cards"
            name: items
            widget: list
            label_singular: "card"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: name, widget: string }
              - { label: "Image (transparent PNG works best)", name: img, widget: image }
              - { label: "Links to", name: to, widget: string, hint: "e.g. /menu#froyo" }
              - { label: "Slug (internal id — leave as is)", name: slug, widget: string }

      - name: story
        label: "Our story gallery"
        file: "content/story.json"
        icon: photo_library
        fields:
          - label: "Gallery photos"
            name: gallery
            widget: list
            label_singular: "photo"
            summary: "{{fields.caption}}"
            fields:
              - { label: "Photo", name: img, widget: image }
              - { label: "Caption", name: caption, widget: string }

  # --------------------------------------------------------------------- MENU
  - name: menu
    label: "Menu items"
    description: "Everything on the menu page — froyo, tonics, coffee, pastries, extras."
    files:
      - name: menu
        label: "Menu items"
        file: "content/menu.json"
        icon: restaurant_menu
        fields:
          - label: "Items"
            name: items
            widget: list
            label_singular: "item"
            summary: "{{fields.name}}  ·  {{fields.cat}}"
            fields:
              - { label: "Name", name: name, widget: string }
              - label: "Category"
                name: cat
                widget: select
                hint: "Which menu section this item appears under."
                options:
                  - { label: "Take-Home Swirl", value: swirl }
                  - { label: "Tonics", value: tonics }
                  - { label: "Coffee", value: coffee }
                  - { label: "Pastries", value: pastries }
              - { label: "Group / sub-heading", name: group, widget: string, required: false, hint: "Shown as the subtitle in the item's popup. e.g. Hot, Iced, Cookies NYC. Leave blank for none." }
              - { label: "Description", name: desc, widget: text, required: false }
              - { label: "Photo", name: img, widget: image, required: false, hint: "Transparent cutout works best. No photo falls back to a category icon." }
              - { label: "Diet tags", name: tags, widget: list, required: false, hint: "Only Vegan, GF and DF show as badges. One per line." }
              - { label: "Internal id", name: id, widget: string, required: false, hint: "Leave blank for new items." }

  # ----------------------------------------------------------------- SETTINGS
  - name: settings
    label: "Store details"
    description: "Address, hours, nutrition PDF, delivery partners, social links, and menu categories."
    files:
      - name: site
        label: "Store details"
        file: "content/site.json"
        icon: store
        fields:
          - label: "Store"
            name: store
            widget: object
            fields:
              - { label: "Name", name: name, widget: string }
              - { label: "Street address", name: addr, widget: string }
              - { label: "City / State / ZIP", name: city, widget: string }
              - { label: "Hours", name: hours, widget: string }
              - { label: "Google Maps link", name: maps, widget: string }
              - { label: "Nutrition & allergens PDF", name: nutritionUrl, widget: file, required: false, hint: "Upload the current nutrition/allergens PDF — linked in the footer and every item popup." }
          - label: "Delivery partners"
            name: delivery
            widget: list
            label_singular: "partner"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: name, widget: string }
              - { label: "Order URL", name: url, widget: string }
              - { label: "Brand color", name: brand, widget: string, hint: "e.g. #FF3008" }
              - { label: "Text color", name: fg, widget: string, hint: "e.g. #fff" }
          - label: "Social links"
            name: social
            widget: list
            label_singular: "link"
            summary: "{{fields.name}}"
            hint: "Shown as icons in the footer."
            fields:
              - { label: "Name", name: name, widget: string, hint: "Instagram, Facebook or TikTok" }
              - label: "Icon"
                name: icon
                widget: select
                options:
                  - { label: "Instagram", value: instagram }
                  - { label: "Facebook", value: facebook }
                  - { label: "TikTok", value: tiktok }
              - { label: "Profile URL", name: url, widget: string }

      - name: categories
        label: "Menu categories (advanced)"
        file: "content/categories.json"
        icon: category
        fields:
          - label: "Categories"
            name: items
            widget: list
            label_singular: "category"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: name, widget: string }
              - { label: "Slug (internal id — leave as is)", name: slug, widget: string }
